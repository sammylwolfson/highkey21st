<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Highkey 21st | Link in Bio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f7f7f7;
      color: #222;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      margin-top: 60px;
      background: #fff;
      padding: 32px 24px;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.07);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin-bottom: 8px;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    p {
      margin-bottom: 24px;
      color: #666;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .link-box {
      background: #222;
      color: #fff;
      padding: 14px 0;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.1rem;
      transition: background 0.2s;
    }
    .link-box:hover {
      background: #0078d7;
    }
    .footer {
      margin-top: 32px;
      color: #aaa;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Highkey 21st</h1>
    <p>Management for the modern era. Connect with us:</p>
    <div class="links">
      <a class="link-box" href="mailto:info@highkey21st.com">Contact Us</a>
      <a class="link-box" href="https://www.linkedin.com/company/highkey21st" target="_blank">LinkedIn</a>
      <a class="link-box" href="https://highkey21st.com" target="_blank">Official Website</a>
      <a class="link-box" href="https://github.com/highkey21st" target="_blank">Our GitHub Projects</a>
    </div>
  </div>
  <div class="footer">
    &copy; 2025 Highkey 21st
  </div>
</body>
</html>
